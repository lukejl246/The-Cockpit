<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#040405">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cockpit">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Cockpit — weekly read</title>
<style>
  :root{
    --bg:#040405; --panel:#1b1b1f; --panel2:#26262b; --panel3:#131316;
    --border:rgba(255,255,255,.09); --border2:rgba(255,255,255,.055); --text:#f5f5f7; --muted:#a1a1a8;
    --faint:#8e8e95; --faint2:#6e6e76; --accent:#0a84ff;
    --z-bottoming:#0a84ff; --z-accumulation:#66d4cf; --z-mid:#30d158;
    --z-elevated:#ff9f0a; --z-euphoria:#ff453a; --divergence:#bf5af2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  .mono{font-family:ui-monospace,monospace}
  .serif{font-family:system-ui}
  .sect{font:600 11px system-ui;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
  .stage{min-height:100%;background:radial-gradient(1100px 520px at 50% -12%,rgba(255,255,255,.035),transparent 62%),var(--bg);padding:38px 32px 72px}
  .wrap{max-width:1160px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
  .card{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:24px 26px;box-shadow:0 14px 34px rgba(0,0,0,.32)}

  /* masthead */
  .mast{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand h1{margin:0;font:700 32px system-ui;letter-spacing:-.022em}
  .badge{font:600 10px system-ui;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);background:rgba(255,255,255,.07);border-radius:999px;padding:4px 10px}
  .tag{font:400 12.5px system-ui;color:#98989d;margin-top:5px}
  .nowlbl{font:600 9.5px system-ui;letter-spacing:.16em;text-transform:uppercase;color:var(--faint2)}

  /* time machine */
  .tm{background:var(--panel3);border:1px solid var(--border2);border-radius:20px;padding:20px 26px 14px;box-shadow:0 14px 34px rgba(0,0,0,.32)}
  .tm-nav{width:28px;height:28px;border-radius:999px;border:none;background:rgba(255,255,255,.08);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;user-select:none}
  .tm-nav:hover{color:var(--text);background:rgba(255,255,255,.14)}
  .tm-plot{position:relative;height:132px;margin-top:12px}
  .tm-node{position:absolute;top:0;bottom:0;transform:translateX(-50%);width:46px;cursor:pointer}
  .tm-dot{position:absolute;left:50%;transform:translate(-50%,-50%);border-radius:50%;transition:width .3s cubic-bezier(.22,1,.36,1),height .3s cubic-bezier(.22,1,.36,1),box-shadow .3s}
  .tm-short{position:absolute;left:50%;top:108px;transform:translateX(-50%);font:10px ui-monospace,monospace;white-space:nowrap;transition:color .3s}

  /* columns */
  .cols{display:flex;gap:16px;align-items:flex-start}
  .col{flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}

  /* verdict */
  .verdict{margin:0 0 22px;font:590 23px/1.42 system-ui;color:#f5f5f7;letter-spacing:-.014em}
  .zoneName{font:700 52px/.95 system-ui;letter-spacing:-.03em}
  .qbtn{cursor:pointer;width:20px;height:20px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--muted);font:600 11px system-ui;display:inline-flex;align-items:center;justify-content:center;user-select:none}
  .qbtn:hover{color:var(--text);background:rgba(255,255,255,.14)}
  .divchip{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;background:rgba(191,90,242,.16);border:none}
  .divsq{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);background:var(--divergence);box-shadow:0 0 10px rgba(191,90,242,.8)}

  /* band */
  .band{position:relative;height:11px;border-radius:999px;background:linear-gradient(90deg,#0a84ff,#66d4cf 25%,#30d158 50%,#ff9f0a 75%,#ff453a);box-shadow:inset 0 1px 3px rgba(0,0,0,.35)}
  .marker{position:absolute;top:-9px;bottom:-9px;width:0;animation:markerIn .9s cubic-bezier(.34,1.3,.5,1) both;pointer-events:none}
  .marker .halo{position:absolute;left:50%;top:50%;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,rgba(233,236,239,.5),rgba(233,236,239,0) 70%);animation:haloPulse 3.4s ease-in-out infinite}
  .marker .stem{position:absolute;left:-1.5px;top:0;bottom:0;width:3px;border-radius:2px;background:var(--text);box-shadow:0 0 10px rgba(233,236,239,.6)}
  .marker .knob{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--text)}
  .ticks{position:relative;height:24px}
  .tick{position:absolute;bottom:0;transform:translateX(-50%);text-align:center}
  .tick .t{font:9px ui-monospace,monospace;color:var(--faint2)}
  .tick .bar{width:1px;height:7px;margin:2px auto 0}
  .zlabels{display:flex;margin-top:13px}
  .zlabels>div{flex:1;padding-top:8px}
  .zl{font-family:system-ui;font-size:11px;letter-spacing:.05em;text-transform:uppercase}

  .vmeta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:22px;padding-top:15px;border-top:1px solid var(--border2);font:11.5px ui-monospace,monospace;color:var(--muted)}
  .vsep{width:1px;height:12px;background:var(--border)}
  .pill{padding:3px 9px;background:rgba(255,255,255,.07);border-radius:999px;color:var(--faint);font-size:10px}

  /* macro */
  .mstate{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:8px}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mtile{position:relative;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid transparent}
  .mtile .lbl{display:flex;align-items:center;gap:6px;font:500 10px system-ui;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .mtile .val{font:16px ui-monospace,monospace;color:var(--text)}
  .mtile .val .sub{font-size:11px;color:var(--faint)}
  .tip{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:5;padding:10px 12px;border-radius:9px;background:#2a2a2e;border:none;box-shadow:0 16px 40px rgba(0,0,0,.55);font:12px/1.45 system-ui;color:#e8e8ed;opacity:0;visibility:hidden;transition:opacity .18s}
  .mtile:hover .tip{opacity:1;visibility:visible}

  /* dials */
  .dial{border-top:1px solid var(--border2)}
  .dial-row{display:flex;align-items:center;gap:12px;padding:13px 0;cursor:pointer}
  .dial-label{min-width:78px;font:600 12px system-ui;letter-spacing:.03em;color:var(--text)}
  .dial-read{position:relative;display:flex;align-items:center;gap:7px;min-width:118px}
  .dial-read .r{font:13.5px ui-monospace,monospace}
  .dtip{position:absolute;left:0;top:calc(100% + 7px);z-index:6;width:230px;padding:10px 12px;border-radius:12px;background:#2a2a2e;border:none;box-shadow:0 16px 40px rgba(0,0,0,.55);font:12px/1.45 system-ui;color:#e8e8ed;opacity:0;visibility:hidden;transition:opacity .18s}
  .dial-read:hover .dtip{opacity:1;visibility:visible}
  .tier{padding:3px 8px;border-radius:6px;font:9.5px system-ui;letter-spacing:.05em;cursor:pointer;white-space:nowrap}
  .dial-n{font:10.5px ui-monospace,monospace;color:var(--faint2);white-space:nowrap}
  .llchip{padding:2px 6px;border-radius:5px;border:1px solid var(--border2);font:9px system-ui;letter-spacing:.03em;color:var(--faint2);white-space:nowrap}
  .refrow{display:grid;grid-template-columns:88px 58px 1fr auto;align-items:baseline;gap:3px 10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.055)}
  .refname{font:600 11px system-ui;color:var(--muted)}
  .refread{font:12.5px ui-monospace,monospace;color:var(--text)}
  .refstate{font:12px system-ui;color:var(--muted)}
  .refnote{grid-column:2/-1;font:italic 400 10.5px system-ui;color:var(--faint2)}
  @media(max-width:820px){.refrow{grid-template-columns:74px 52px 1fr auto}.refnote{grid-column:1/-1}}
  .chev{color:var(--faint2);font-size:11px;transition:transform .3s}
  .dial-mean{padding-left:90px;margin-top:3px;font:13.5px/1.45 system-ui;color:var(--muted)}
  .pop{position:absolute;right:0;top:calc(100% + 7px);z-index:7;width:260px;padding:13px 15px;border-radius:14px;background:#2a2a2e;border:none;box-shadow:0 18px 44px rgba(0,0,0,.6)}
  .expand{padding:2px 0 16px 90px}
  .expand .inner{padding:13px 16px;border-radius:11px;background:var(--panel3);border:1px solid var(--border2)}
  .post{margin:0 0 12px;font:italic 500 15px/1.5 system-ui;color:#e8e8ed}

  /* narrative + calibration */
  .narr{display:flex;gap:11px;align-items:baseline}
  .narr .a{font:13px ui-monospace,monospace;width:14px;text-align:center;color:var(--faint2)}
  .narr .t{font:13.5px/1.5 system-ui;color:#d5d5da}
  .calhead{display:flex;gap:10px;padding:0 4px 8px;font:600 9px system-ui;letter-spacing:.08em;text-transform:uppercase;color:var(--faint2)}
  .calrow{display:flex;gap:10px;align-items:center;padding:9px 4px;border-top:1px solid rgba(255,255,255,.055)}
  .pending{padding:14px 16px;border-radius:14px;background:rgba(10,132,255,.10);border:none;margin-bottom:14px}

  .footer{font:12px/1.65 system-ui;color:var(--faint2);max-width:900px;border-top:1px solid rgba(255,255,255,.06);padding-top:18px}
  @keyframes markerIn{from{transform:translateX(-32px)}to{transform:translateX(0)}}
  @keyframes haloPulse{0%,100%{opacity:.35;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.25)}}
  @keyframes expandIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ---- polish: transitions, hover states, post grid ---- */
  .card{transition:border-color .3s ease}
  .dial-row{margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:9px;transition:background .18s ease}
  .dial-row:hover{background:rgba(255,255,255,.04)}
  .refrow{margin:0 -6px;padding-left:6px;padding-right:6px;border-radius:8px;transition:background .18s ease}
  .refrow:hover{background:rgba(255,255,255,.04)}
  .mtile{transition:border-color .2s ease,background .2s ease}
  .mtile:hover{background:rgba(255,255,255,.085)}
  .calrow{transition:background .15s ease}
  .calrow:hover{background:rgba(10,132,255,.05)}
  button{transition:background .18s ease,border-color .18s ease,color .18s ease}
  .poststrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .poststrip>div{transition:border-color .2s ease}
  .poststrip>div:hover{border-color:rgba(255,255,255,.14)}
  .tm-nav:active{transform:scale(.92)}
  a{color:var(--accent)}
  .modetog{display:inline-flex;background:rgba(255,255,255,.07);border-radius:999px;padding:2px;overflow:hidden;font:600 11.5px system-ui;letter-spacing:0;user-select:none}
  .modetog span{padding:6px 15px;border-radius:999px;cursor:pointer;color:var(--muted);transition:background .18s,color .18s}
  .modetog span:hover{color:var(--text)}
  .modetog span.on{background:var(--accent);color:#fff}
  .plainbox{margin:0 0 20px;padding:16px 18px;border-radius:16px;background:rgba(10,132,255,.12);border:none;font:15px/1.6 system-ui;color:#eef3fb}
  .plainbox .lead{display:block;font:600 9.5px system-ui;letter-spacing:.14em;text-transform:uppercase;color:#0a84ff;margin-bottom:7px}
  .plaindesc{font:italic 400 12px system-ui;color:#98989d}
  /* pull button — only appears when the local engine answers */
  .pullbtn{cursor:pointer;display:inline-flex;align-items:center;gap:6px;font:600 11px system-ui;color:var(--text);background:rgba(255,255,255,.08);border:none;border-radius:999px;padding:6px 13px;user-select:none}
  .pullbtn:hover{background:rgba(255,255,255,.14)}
  .pullbtn.on{color:#fff;background:rgba(10,132,255,.28);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  /* The Journey — 3D terrain hero (Simple mode) */
  .jrcard{padding:16px 16px 12px}
  .jrtop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .jrbtns{display:flex;gap:7px;flex-wrap:wrap}
  .jrbtn{cursor:pointer;font:600 11px system-ui;color:var(--text);background:rgba(255,255,255,.08);border:none;border-radius:999px;padding:6px 12px}
  .jrbtn:hover{background:rgba(255,255,255,.14)}
  .jrwrap{position:relative;border-radius:16px;overflow:hidden;background:#0c0e12}
  .jrwrap canvas{display:block;width:100%;height:auto}
  .jrwrap:fullscreen{display:flex;align-items:center;justify-content:center;background:#0c0e12}
  .jrnote{font:italic 400 11px/1.5 system-ui;color:var(--faint2);margin-top:9px}
  .jrleg{margin-top:10px;display:flex;flex-direction:column;gap:6px;animation:expandIn .3s ease both}
  .jrleg .row{display:flex;gap:10px;font:12px/1.45 system-ui;color:#a1a1a8}
  .jrleg .k{flex:none;width:132px;font-weight:600;color:#d5d5da}
  @media(max-width:820px){.jrleg .k{width:100px}}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition:none!important}}

  /* ---- responsive: collapse to single column / phone sizes ---- */
  @media(max-width:820px){
    .stage{padding:18px 12px 40px}
    .wrap{gap:16px}
    .cols{flex-direction:column}
    .card{padding:16px 16px}
    .verdict{font-size:17px}
    .zoneName{font-size:30px}
    .zl{font-size:8px;letter-spacing:0;text-transform:none}
    .ticks{display:none}
    .brand h1{font-size:25px}
    .mast{gap:14px}
    .hide-sm{display:none}
    .dial-row{gap:8px}
    .dial-label{min-width:64px}
    .dial-read{min-width:96px}
    .dial-mean{padding-left:0}
    .expand{padding-left:0}
    .poststrip{grid-template-columns:1fr}
    .mgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="stage"><div class="wrap" id="app"></div></div>

<script src="cockpit_data.js"></script>
<script src="cockpit_history.js"></script>
<script>
/* ============================ DATA ============================ */
const ZONES=['bottoming','accumulation','mid-cycle','elevated','euphoria'];
const CUTS=[0.2,0.4,0.6,0.8];
const ZC={bottoming:'#0a84ff',accumulation:'#66d4cf','mid-cycle':'#30d158',elevated:'#ff9f0a',euphoria:'#ff453a'};
const MC={tailwind:'#30d158',neutral:'#98989d',headwind:'#ff453a'};
const MARR={tailwind:'↑',neutral:'→',headwind:'↓'};
const ARR={up:'↑',down:'↓',flat:'→'};
const TTXT={mechanism:'MECHANISM',base:'BASE RATE',story:'STORY'};
const TDEF={mechanism:'Why it should work — a causal chain. The strongest tier; it survives regime change.',base:'In n prior instances of this state, an outcome followed. Strong, but capped by the tiny sample.',story:'“This looks like …”. The weakest, most seductive tier — colour only, always labelled a story.'};
const DET={trend:'Log-regression channel position (0 = historic bottom band, 1 = top band).',valuation:'MVRV = market value ÷ realized value. Above 1 = aggregate in profit; below 1 = underwater.',sentiment:'Weekly RSI(14) plus the Fear & Greed index (0 = extreme fear, 100 = extreme greed).',dominance:'BTC dominance — Bitcoin’s share of total crypto market cap. The rotation tell.'};
const CAV={trend:'Bands fit to ~3–4 cycles — a small sample.',valuation:'MVRV-Z thresholds drift down each cycle — flag it, never hard-band.',sentiment:'Fear & Greed only exists from Feb 2018; earlier pivots are n/a.',dominance:'Not part of the Phase-1 backfill — a mechanism read on a short history.'};

/* ---- Simple mode: plain-English glosses (crypto-literate, not kiddified) ---- */
const PLAIN_DIAL={
  trend:'How cheap or pricey BTC is vs its long-term average',
  valuation:'Whether holders overall are in profit or underwater',
  sentiment:'How fearful or greedy the crowd is right now',
  dominance:'Bitcoin’s share of the market vs altcoins'};
const PLAIN_REF={
  'NUPL':'Are holders in profit overall?','Puell':'Are miners making money?',
  'Hash Ribbon':'Are miners stressed / capitulating?','SSR osc':'How much sideline stablecoin cash is waiting?',
  'BMSB':'The line separating bull and bear trends','Funding':'How hot is leverage / speculation?',
  'OI (Binance)':'How big are futures bets right now?','OI / mcap':'Futures bet size vs the whole market'};
const PLAIN_MACRO={
  'Net liquidity':'Money sloshing in the financial system','USD index':'How strong the US dollar is',
  'Real 10y':'The real cost of money','Fed stance':'Which way the central bank is leaning'};
const PLAIN_ZONE={
  bottoming:'historically cheap and out of favour — like past cycle lows',
  accumulation:'still cheap and quietly rebuilding, off the lows',
  'mid-cycle':'fairly valued — not cheap, not stretched',
  elevated:'running hot — stretched above trend, getting late-cycle',
  euphoria:'euphoric — about as stretched as past cycle tops'};
const PLAIN_MSTATE={tailwind:'helping risk assets (a tailwind)',neutral:'neutral',headwind:'working against risk assets (a headwind)'};
function plainSummary(r){
  const zone=zoneFor(r),m=r.macro;
  return `<b style="color:${ZC[zone]};text-transform:capitalize">${zone}</b> — ${PLAIN_ZONE[zone]||''}. The macro backdrop (rates, liquidity, the Fed) is <b>${PLAIN_MSTATE[m.state]}</b>.${r.div.on?' Watch-out: price has run ahead of the on-chain data (a divergence).':''}`;
}
function zoneOf(c){let n=0;for(const x of CUTS){if(c>=x)n++;}return ZONES[n];}
const zoneFor=r=>r.zone||zoneOf(r.composite); /* live zone carries hysteresis (method v1.1) */
function rgba(hex,a){const h=hex.replace('#','');return 'rgba('+parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16)+','+a+')';}
function D(key,label,reading,dir,meaning,post,tier,n,na){return {key,label,reading,dir,meaning,post,tier,n,detail:DET[key],caveat:CAV[key],na:!!na};}
function mkdials(t,v,s,dom){return [
  D('trend','Trend',t[0],t[1],t[2],t[3],'base','n=7'),
  D('valuation','Valuation',v[0],v[1],v[2],v[3],'base','n=7'),
  D('sentiment','Sentiment',s[0],s[1],s[2],s[3],'base','n=7'),
  dom ? D('dominance','Dominance',dom[0],dom[1],dom[2],dom[3],'mechanism','short hist.')
      : D('dominance','Dominance','n/a','flat','not in Phase-1 backfill','','story','—',true),
];}

const READS=[
  {id:'live',kind:'live',short:'Live',label:'Live read',date:'2026-07-01',price:'$58,525',composite:0.16,
   verdict:'Bottoming — BTC sits in the composite band that marked the 2015 / 2018 / 2022 lows (n=3), sentiment at extreme fear, macro still a headwind. No price/valuation divergence.',
   div:{on:false},
   macro:{state:'headwind',netLiq:'$5.79T',netLiqTrend:'falling',dxy:'120.9',real10y:'2.16%',fed:'hold'},
   dials:mkdials(['0.09','down','deep below the long-term mean','stretched to the downside, like past accumulation zones'],['MVRV 1.10','down','barely above cost basis','holders near break-even, not euphoric'],['RSI 32 · F&G 11','flat','crowd fearful, momentum cold','extreme fear and cold momentum, like past lows'],['BTC.D 55.4%','flat','BTC-led, no alt-season froth','capital hiding in BTC, not chasing alts']),
   narrative:[{dir:'down',text:'Composite 0.17 → 0.16 (still bottoming).'},{dir:'down',text:'Fear & Greed 15 → 11 (deeper fear).'},{dir:'down',text:'Net liquidity still falling.'}],
   invalidation:'flip off bottoming if composite prints > 0.20 and price reclaims its long-term mean.',outcome:null},

  {id:'t2013',kind:'top',short:"'13 top",label:'2013 top',date:'2013-12-04',price:'$1,135',composite:0.97,
   verdict:'Euphoria — BTC is as stretched above its long-term trend as it has ever been, valuation at an extreme premium to cost basis. The first cycle top on record: no prior tops to base-rate against (n=0). Macro a tailwind. And a divergence: November’s valuation peak ran below April’s — price ahead of on-chain value.',
   div:{on:true},
   macro:{state:'tailwind',netLiq:'$3.88T',netLiqTrend:'rising',dxy:'93.9',real10y:'0.73%',fed:'hold'},
   dials:mkdials(['1.00','up','at the very top of the channel','as stretched vs trend as price has ever been'],['MVRV 4.72','up','extreme premium to cost basis','~4.7× cost basis — historically top territory'],['RSI 97 · F&G n/a','up','momentum at its ceiling','weekly RSI near 100 — a blow-off'],null),
   narrative:[{dir:'up',text:'Composite 0.88 → 0.97 (into euphoria).'},{dir:'up',text:'Weekly RSI 92 → 97 (blow-off).'},{dir:'up',text:'Price ~doubled in five weeks.'}],
   invalidation:'',outcome:{win:'fwd 12 mo',range:'≈ −58%',scored:'within'}},

  {id:'t2017',kind:'top',short:"'17 top",label:'2017 top',date:'2017-12-16',price:'$19,641',composite:0.93,

  if(ssr!=null)ref.push(R('SSR osc',(ssr>=0?'+':'')+ssr.toFixed(2),ssrState(ssr),'leads','oscillator form'));
  if(bmsb!=null)ref.push(R('BMSB',bmsb==2?'above band':bmsb==0?'below band':'inside',bmsb==2?'bull regime':bmsb==0?'bear regime':'contested','coincident','20W SMA + 21W EMA gate'));
  const narrative=[];
  if(prev){narrative.push({dir:A(comp,pget('comp'),.004),text:`Composite ${pget('comp').toFixed(2)} → ${comp.toFixed(2)} (${zoneOf(pget('comp'))===zone?'still ':'now '}${zone}).`});
    if(mvrv!=null&&pget('mvrv')!=null)narrative.push({dir:A(mvrv,pget('mvrv'),.01),text:`MVRV ${pget('mvrv').toFixed(2)} → ${mvrv.toFixed(2)}.`});
    narrative.push({dir:nlt==1?'up':nlt==-1?'down':'flat',text:`Net liquidity ${macro.netLiq} and ${macro.netLiqTrend}.`});}
  const rel=get('rel');
  return {id:'scrub',label:'week of '+w[0],date:w[0],price:'$'+Math.round(get('px')).toLocaleString(),
    composite:comp,verdict:verdictLine(zone,ms,sentClass(rsi),get('div')==1),div:{on:get('div')==1},
    macro,dials:mkdials(t,v,s,null),ref,rel:rel!=null?{pct:rel,band:relBandOf(rel)}:null,narrative,scrub:true};
}

function timeMachine(){
  if(!HIST) return timeMachineWave();
  tmIndex();
  const N=HIST.weeks.length;
  // zone-coloured line segments
  let segs=[],run=[],rz=null;
  HIST.weeks.forEach((w,i)=>{
    const z=zoneOf(w[1]), pt=(i/(N-1)*1000).toFixed(1)+','+tmY(w[1]).toFixed(1);
    if(rz!==null&&z!==rz){ run.push(pt); segs.push([rz,run]); run=[pt]; }
    else run.push(pt);
    rz=z;
  });
  if(run.length) segs.push([rz,run]);
  const lines=segs.map(([z,pts])=>`<polyline points="${pts.join(' ')}" fill="none" stroke="${rgba(ZC[z],.9)}" stroke-width="1.7" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>`).join('');
  const halvings=HIST.halvings.map(h=>{
    const i=HIST.weeks.findIndex(w=>w[0]>=h); if(i<0) return '';
    const x=(i/(N-1)*1000).toFixed(1);
    return `<line x1="${x}" y1="0" x2="${x}" y2="150" stroke="#2b323c" stroke-width="1" stroke-dasharray="3,4" vector-effect="non-scaling-stroke"/>`;
  }).join('');
  const hlabels=HIST.halvings.map(h=>{
    const i=HIST.weeks.findIndex(w=>w[0]>=h); if(i<0) return '';
    return `<span style="position:absolute;left:${(i/(N-1)*100)}%;top:2px;transform:translateX(-50%);font:9px ui-monospace,monospace;color:#5c5c63">⛏ '${h.slice(2,4)}</span>`;
  }).join('');
  const dots=Object.entries(PIVW).map(([id,i])=>{
    const r=READS.find(x=>x.id===id); if(!r||i<0) return '';
    const col=ZC[zoneFor(r)], sel=id===S.readId;
    return `<span onclick="setRead('${id}')" onpointerdown="event.stopPropagation()" title="${r.label}" style="position:absolute;left:${(i/(N-1)*100)}%;top:${tmY(HIST.weeks[i][1])-(sel?7:5)}px;transform:translateX(-50%);width:${sel?14:10}px;height:${sel?14:10}px;border-radius:50%;background:${col};cursor:pointer;box-shadow:${sel&&S.scrub==null?('0 0 0 3px '+rgba(col,.3)+',0 0 12px '+rgba(col,.7)):'0 0 0 2px #131316'};z-index:3"></span>`;
  }).join('');
  const curX=(SCRUB/(N-1)*100)+'%', curY=tmY(HIST.weeks[SCRUB][1])-4;
  return `<div class="tm">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <span class="sect">Time machine · every week since ${HIST.weeks[0][0].slice(0,4)}</span>
      <div style="display:flex;align-items:center;gap:12px">
        ${S.scrub!=null?`<span onclick="exitScrub()" style="cursor:pointer;font:600 11px system-ui;color:var(--accent);border:1px solid rgba(10,132,255,.4);border-radius:7px;padding:3px 10px">⟲ back to live</span>`:`<span style="font:12px system-ui;color:#8e8e95" class="hide-sm">drag to scrub · release to read that week · click a dot for a pivot</span>`}
        <div style="display:flex;gap:6px"><span class="tm-nav" onclick="step(-1)">◀</span><span class="tm-nav" onclick="step(1)">▶</span></div>
      </div>
    </div>
    <div id="tmplot" style="position:relative;height:150px;margin-top:10px;touch-action:none;cursor:crosshair"
         onpointerdown="tmScrub(event)" onpointermove="if(event.buttons)tmScrub(event)" onpointerup="tmCommit()">
      <svg viewBox="0 0 1000 150" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible">${halvings}${lines}</svg>
      ${hlabels}${dots}
      <div id="tmcur" style="position:absolute;top:0;bottom:0;left:${curX};width:0;pointer-events:none;z-index:2">
        <div style="position:absolute;top:0;bottom:0;left:-0.5px;width:1px;background:rgba(233,236,239,.45)"></div>
        <div id="tmcdot" style="position:absolute;left:-4px;top:${curY}px;width:8px;height:8px;border-radius:50%;background:#f5f5f7;box-shadow:0 0 8px rgba(233,236,239,.7)"></div>
      </div>
    </div>
    <div id="tmout" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);min-height:34px">${tmReadout(SCRUB)}</div>
  </div>`;
}

function timeMachineWave(){
  const cur=read();
  const wave=ORDER.map(id=>{const r=READS.find(x=>x.id===id);return (LEFT[id]*10)+','+Math.round(12+(1-r.composite)*84);}).join(' ');
  const nodes=ORDER.map(id=>{
    const r=READS.find(x=>x.id===id);const sel=id===S.readId;const col=ZC[zoneFor(r)];
    const size=sel?17:11, top=Math.round(12+(1-r.composite)*84);

    return `<div class="tm-node" style="left:${LEFT[id]}%" onclick="setRead('${id}')">
      <span class="tm-dot" style="top:${top}px;width:${size}px;height:${size}px;background:${col};box-shadow:${ring}"></span>
      <span class="tm-short" style="color:${sel?'#f5f5f7':'#8e8e95'}">${r.short.replace(' top','').replace(' low','')==='Live'?'Live':r.short.replace(' top',"'").replace(' low',"'").replace("''","'")}</span>

        <polyline points="${wave}" fill="none" stroke="#2b323c" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"></polyline>

const RBADGE={ALERT:{c:'#ff453a',t:'ALERT'},SCORECARD:{c:'#0a84ff',t:'SCORECARD'},
  HISTORY:{c:'#30d158',t:'HISTORY'},WEEKLY:{c:'#ff9f0a',t:'WEEKLY'},
  GLANCE:{c:'#66d4cf',t:'GLANCE'},'FIELD NOTE':{c:'#98989d',t:'FIELD NOTE'}};
function pcard(title,text,copyJs,long){
  const n=text.length, over=!long&&n>280;
  return `<div style="padding:11px 13px;border-radius:10px;background:var(--panel3);border:1px solid var(--border2);display:flex;flex-direction:column;gap:7px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="font:600 10px system-ui;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">${title}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span style="font:10px ui-monospace,monospace;color:${over?'#ff9f0a':'#6e6e76'}">${long?n+' chars':n+'/280'}</span>
        <button onclick="${copyJs}" style="cursor:pointer;font:600 10px system-ui;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:3px 9px">copy</button>
      </span></div>
    <div style="font:12.5px/1.55 system-ui;color:#d5d5da;white-space:pre-wrap">${esc(text)}</div></div>`;
}
function radarPanel(r){
  if(r.id!=='live'||S.simple) return '';
  const RD=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.radar;
  const SR=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.series;
  const P=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.posts;
  if(!RD||!RD.length) return '';
  const draftBlock=c=>{
    if(c.target==='thread'){
      if(!P||!P.thread||!P.thread.length) return `<div style="font:italic 12px system-ui;color:var(--faint2)">The weekly thread is in Post studio below.</div>`;
      return P.thread.map((t,i)=>pcard(`thread ${i+1}/${P.thread.length}`,t,`copyPost('thread',${i},this)`)).join('');
    }
    const key=c.target.split(':')[1], s=SR&&SR[key];
    if(!s) return `<div style="font:italic 12px system-ui;color:var(--faint2)">Draft not available this week.</div>`;
    let out=pcard('X post',s.x,`copySeries('${key}','x',this)`);
    if(s.newsletter) out+=pcard('Newsletter long-form',s.newsletter,`copySeries('${key}','news',this)`,true);
    return out;
  };
  const cards=RD.map((c,i)=>{
    const b=RBADGE[c.badge]||{c:'#98989d',t:c.badge}, open=S.radarOpen[i];
    return `<div style="border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:var(--panel2)">
      <div onclick="toggleRadar(${i})" style="display:flex;align-items:center;gap:11px;padding:12px 13px;cursor:pointer;user-select:none">
        <span style="flex:none;font:700 9px system-ui;letter-spacing:.06em;color:#0c0e12;background:${b.c};border-radius:5px;padding:3px 7px">${b.t}</span>
        <div style="flex:1;min-width:0">
          <div style="font:600 13px/1.35 system-ui;color:#f5f5f7">${esc(c.title)}</div>
          <div style="font:12px/1.4 system-ui;color:#98989d;margin-top:2px">${esc(c.why)}</div>
        </div>
        <span class="chev" style="flex:none;transform:rotate(${open?90:0}deg);color:var(--faint2);font-size:12px">▸</span>
      </div>
      ${open?`<div style="padding:0 13px 13px;display:flex;flex-direction:column;gap:8px;animation:expandIn .3s ease both">${draftBlock(c)}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px">
      <span class="sect">Post radar <span style="color:#5c5c63">· what's worth posting now</span></span>
      <span style="font:10px ui-monospace,monospace;color:#6e6e76">${RD.length} ranked · gate-checked</span>
    </div>
    <div style="font:italic 400 11px/1.5 system-ui;color:var(--faint2);margin-bottom:11px">Ranked by rarity — alerts and matured windows first, the weekly anchor always there. Open a card for the ready draft. Silent when nothing's material.</div>
    <div style="display:flex;flex-direction:column;gap:9px">${cards}</div>
  </div>`;
}

/* Phase 8 — Post studio: gated drafts shipped in the payload. Live read only.
   Copy-to-clipboard; nothing auto-posts. */
function copyPost(kind,idx,btn){
  const P=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.posts; if(!P)return;
  const text = kind==='thread' ? P.thread[idx] : P[kind][idx].text;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='copied ✓';setTimeout(()=>btn.textContent='copy',1400);});
}

  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px">
      <span class="sect">Post studio <span style="color:#5c5c63">· drafts from the live read</span></span>
      <span style="font:10px ui-monospace,monospace;color:#6e6e76">gate-checked · nothing auto-posts</span>
    </div>
    <div style="font:italic 400 11px/1.5 system-ui;color:var(--faint2);margin-bottom:6px">Regenerated with each data refresh — when the panel changes materially, so do these. Edit before posting.</div>
    ${section('thread','The weekly thread',`${P.thread.length} posts`,thread)}
    ${section('signals','Single-signal posts',`${P.signals.length} posts`,signals)}
    ${section('combos','Combo posts · fired by current conditions',P.combos.length?`${P.combos.length} live`:'none this week',combos)}
  </div>`;
}

/* ============ THE JOURNEY — bitcoin's history as a landscape (Simple hero) ============
   The USP rule: every element is driven by a real signal; nothing is decoration.
   Mountains = actual weekly price (log height) · ridge behind = composite ·
   far ridge = valuation · colours = each week's zone · sky = macro state ·
   mist = crowd fear · water = the liquidity tide · beacon = the current read ·
   lightning = the divergence flag. New signals become new landscape elements. */
let JRAF=null, JDATA=null, JTERR=null;
function jrData(){
  if(JDATA||!HIST) return JDATA;
  const F=HIST.fields, W=HIST.weeks;
  const di=F.indexOf('date'), pi=F.indexOf('px'), ci=F.indexOf('comp'), mi=F.indexOf('mvrv');
  const lg=Math.log10;
  const pxl=W.map(w=>lg(w[pi]));
  const mn=Math.min(...pxl), mx=Math.max(...pxl);
  const mvl=W.map(w=>w[mi]!=null?lg(Math.max(w[mi],.05)):null);
  const mvv=mvl.filter(v=>v!=null), m0=Math.min(...mvv), m1=Math.max(...mvv);
  JDATA={n:W.length,
    px:pxl.map(v=>(v-mn)/(mx-mn)),
    comp:W.map(w=>w[ci]),
    mvrv:mvl.map(v=>v==null?null:(v-m0)/(m1-m0)),
    zone:W.map(w=>zoneOf(w[ci])),
    dates:W.map(w=>w[di])};
  return JDATA;
}
function jrFear(r){
  const s=String((r.dials&&r.dials[2]&&r.dials[2].reading)||'');
  const g=s.match(/F&G (\d+)/); if(g) return Math.max(0,Math.min(1,(45-+g[1])/45));
  const m=s.match(/RSI (\d+)/); if(m) return Math.max(0,Math.min(1,(45-+m[1])/45));
  return null;
}
function jrIdx(d){
  if(S.scrub!=null) return S.scrub;
  tmIndex();
  if(PIVW&&S.readId!=='live'&&PIVW[S.readId]!=null) return PIVW[S.readId];
  return d.n-1;
}
function jrTerrain(ctx,W,H,d){
  const ridge=(arr,base,scale,color,alpha)=>{
    ctx.beginPath(); ctx.moveTo(-4,base+2);
    for(let i=0;i<d.n;i++){const v=arr[i]; if(v==null)continue;
      ctx.lineTo(i/(d.n-1)*W, base-v*scale);}
    ctx.lineTo(W+4,base+2); ctx.closePath();
    ctx.globalAlpha=alpha; ctx.fillStyle=color; ctx.fill(); ctx.globalAlpha=1;
  };
  ridge(d.mvrv, H*.56, H*.20, '#2b3550', .8);   // valuation — far ridge
  ridge(d.comp, H*.68, H*.30, '#1e2740', .92);  // composite — mid ridge
  const base=H*.92, scale=H*.55;                 // price — the mountains, zone-coloured
  for(let i=0;i<d.n-1;i++){
    const x0=i/(d.n-1)*W, x1=(i+1)/(d.n-1)*W;
    const y0=base-d.px[i]*scale, y1=base-d.px[i+1]*scale;
    const g=ctx.createLinearGradient(0,Math.min(y0,y1),0,base);
    g.addColorStop(0,rgba(ZC[d.zone[i]],.66)); g.addColorStop(1,'rgba(10,12,16,.97)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(x0,base);ctx.lineTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x1,base);ctx.closePath();ctx.fill();
  }
  ctx.lineWidth=Math.max(1.2,W/900); let run=d.zone[0];
  ctx.beginPath(); ctx.moveTo(0,base-d.px[0]*scale); ctx.strokeStyle=rgba(ZC[run],.95);
  for(let i=1;i<d.n;i++){
    const x=i/(d.n-1)*W, y=base-d.px[i]*scale;
    if(d.zone[i]!==run){ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);run=d.zone[i];ctx.strokeStyle=rgba(ZC[run],.95);}
    else ctx.lineTo(x,y);
  }
  ctx.stroke();
}
function jrScene(ctx,W,H,t,r,layer){
  const d=jrData(); if(!d) return;
  const st=(r.macro&&r.macro.state)||'neutral';
  let g=ctx.createLinearGradient(0,0,0,H*.9);            // SKY — the macro tide
  if(st==='tailwind'){g.addColorStop(0,'#16223c');g.addColorStop(.5,'#33517a');g.addColorStop(.85,'#b97f3f');}
  else if(st==='headwind'){g.addColorStop(0,'#0b0d13');g.addColorStop(.8,'#20242f');}
  else{g.addColorStop(0,'#141926');g.addColorStop(.8,'#333c4e');}
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(st==='tailwind'){                                    // dawn sun
    const sx=W*.8,sy=H*.3,rr=H*.34;
    const rg=ctx.createRadialGradient(sx,sy,0,sx,sy,rr);
    rg.addColorStop(0,'rgba(255,210,140,.85)');rg.addColorStop(.18,'rgba(255,196,120,.4)');rg.addColorStop(1,'rgba(255,196,120,0)');
    ctx.fillStyle=rg;ctx.fillRect(sx-rr,sy-rr,rr*2,rr*2);
  }else{                                                  // cloud bank
    ctx.fillStyle=st==='headwind'?'rgba(24,28,38,.85)':'rgba(46,54,70,.5)';
    for(let i=0;i<5;i++){const cx=(((i*.23+.08)+(t/90000))%1.15)*W, cy=H*(.10+i*.05);
      ctx.beginPath();ctx.ellipse(cx,cy,W*.16,H*.045,0,0,7);ctx.fill();}
  }
  if(st==='headwind'){                                    // rain
    ctx.strokeStyle='rgba(150,168,196,.13)';ctx.lineWidth=1;
    const off=(t*.09)%26;
    for(let x=-H*.2;x<W;x+=26){ctx.beginPath();ctx.moveTo(x+off,0);ctx.lineTo(x+off+H*.13,H*.58);ctx.stroke();}
  }
  if(layer)ctx.drawImage(layer,0,0,W,H); else jrTerrain(ctx,W,H,d);  // TERRAIN
  const fear=jrFear(r);                                   // MIST — crowd fear
  if(fear&&fear>0.02){
    const my=H*.62, drift=Math.sin(t/4200)*W*.01;
    const mg=ctx.createLinearGradient(0,my-H*.13,0,my+H*.10);
    mg.addColorStop(0,'rgba(190,205,225,0)');mg.addColorStop(.5,`rgba(190,205,225,${.30*fear})`);mg.addColorStop(1,'rgba(190,205,225,0)');
    ctx.fillStyle=mg;ctx.fillRect(drift-W*.02,my-H*.13,W*1.04,H*.23);
  }
  const wy=H*.92;                                         // WATER — the liquidity tide
  const wg=ctx.createLinearGradient(0,wy,0,H);
  wg.addColorStop(0,st==='tailwind'?'rgba(66,96,130,.9)':'rgba(28,36,52,.95)');wg.addColorStop(1,'#080a0e');
  ctx.fillStyle=wg;ctx.fillRect(0,wy,W,H-wy);
  ctx.strokeStyle='rgba(160,190,220,.14)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){const y=wy+3+i*((H-wy)/3.4)+Math.sin(t/1600+i)*1.2;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const rising=(r.macro&&r.macro.netLiqTrend)==='rising';
  ctx.fillStyle='rgba(170,200,230,.55)';ctx.font=`${Math.max(9,W/120)}px ui-monospace,monospace`;
  ctx.fillText(`the tide ${rising?'▲ rising':'▼ falling'}`,8,H-6);
  tmIndex();                                              // LABELS — the real pivots
  if(PIVW){ctx.font=`600 ${Math.max(10,W/105)}px system-ui,sans-serif`;ctx.textAlign='center';
    const lb=H*.92, ls=H*.55;
    for(const id in PIVW){
      if(id==='live')continue;
      const rr=READS.find(x=>x.id===id); if(!rr)continue;
      const x=PIVW[id]/(d.n-1)*W, y=lb-d.px[PIVW[id]]*ls;
      ctx.fillStyle=rr.kind==='top'?'rgba(233,236,239,.75)':'rgba(150,163,180,.7)';
      ctx.fillText(rr.short.replace(' top','').replace(' low',''),x,rr.kind==='top'?y-8:Math.min(lb-4,y+16));
    }
    ctx.textAlign='left';}
  const bi=jrIdx(d), bb=H*.92, bs=H*.55;                  // BEACON — you are here
  const bx=bi/(d.n-1)*W, by=bb-d.px[bi]*bs;
  const pg=ctx.createLinearGradient(0,by-H*.30,0,by);
  pg.addColorStop(0,'rgba(10,132,255,0)');pg.addColorStop(1,'rgba(10,132,255,.5)');
  ctx.fillStyle=pg;ctx.fillRect(bx-1.5,by-H*.30,3,H*.30);
  ctx.fillStyle='#BFD7FF';ctx.beginPath();ctx.arc(bx,by,2.6,0,7);ctx.fill();
  ctx.strokeStyle='rgba(150,190,255,.5)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.arc(bx,by,5.7+Math.sin(t/420)*1.6,0,7);ctx.stroke();
  ctx.font=`600 ${Math.max(10,W/105)}px system-ui,sans-serif`;ctx.textAlign=bx>W*.75?'right':'left';
  const lx=bx+(bx>W*.75?-10:10);
  ctx.fillStyle='#f5f5f7';ctx.fillText(S.scrub!=null?`week of ${r.date}`:'you are here',lx,by-H*.31);
  ctx.fillStyle='#9fb3cd';ctx.fillText(`${r.price}`,lx,by-H*.31+Math.max(13,W/80));
  ctx.textAlign='left';
  if(r.div&&r.div.on){                                    // LIGHTNING — divergence flag
    const flash=(t%2600)<230?.95:.25;
    ctx.strokeStyle=`rgba(255,224,130,${flash})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(bx+W*.02,by-H*.42);
    ctx.lineTo(bx+W*.004,by-H*.30);ctx.lineTo(bx+W*.016,by-H*.28);ctx.lineTo(bx-W*.002,by-H*.16);
    ctx.stroke();
  }
}
function jrRender(c,ts){
  const wrap=c.parentElement, cw=wrap.clientWidth||600;
  const fs=document.fullscreenElement===wrap;
  const ch=fs?wrap.clientHeight:Math.max(210,Math.min(430,cw*.42));
  const dpr=Math.min(2,window.devicePixelRatio||1);
  if(c.width!==Math.round(cw*dpr)||c.height!==Math.round(ch*dpr)){
    c.width=Math.round(cw*dpr);c.height=Math.round(ch*dpr);
    c.style.height=ch+'px';JTERR=null;
  }
  const ctx=c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(!JTERR){JTERR=document.createElement('canvas');JTERR.width=c.width;JTERR.height=c.height;
    const tc=JTERR.getContext('2d');tc.setTransform(dpr,0,0,dpr,0,0);jrTerrain(tc,cw,ch,jrData());}
  jrScene(ctx,cw,ch,ts,read(),JTERR);
}
function jrStart(){
  if(JRAF)cancelAnimationFrame(JRAF);
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const step=ts=>{const c=document.getElementById('jrc');if(!c){JRAF=null;return;}
    jrRender(c,ts); JRAF=reduced?null:requestAnimationFrame(step);};
  JRAF=requestAnimationFrame(step);
}
function jrFull(){const w=document.getElementById('jrwrap');if(w&&w.requestFullscreen)w.requestFullscreen();}
function jrSnap(){
  const r=read(), W=1600, H=900, pad=110;
  const c=document.createElement('canvas');c.width=W;c.height=H+pad;
  const ctx=c.getContext('2d');
  jrScene(ctx,W,H,1200,r,null);
  ctx.fillStyle='#0b0d11';ctx.fillRect(0,H,W,pad);
  const zone=zoneFor(r);
  ctx.fillStyle='#f5f5f7';ctx.font="700 38px system-ui,sans-serif";
  ctx.fillText(`${r.date} · BTC ${r.price} · ${zone.toUpperCase()}`,36,H+46);
  ctx.fillStyle='#a1a1a8';ctx.font="24px system-ui,sans-serif";
  ctx.fillText(`${PLAIN_ZONE[zone]||''} · macro: ${PLAIN_MSTATE[r.macro.state]||r.macro.state}`,36,H+84);
  c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download=`journey-${r.date}.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);});
}
function journeyPanel(r){
  if(!HIST) return '';   // the transparency rule: the scene exists only when the data does
  const fear=jrFear(r);
  const legend=[
    ['The mountains',"bitcoin's actual price, every week since 2010 — height is the real (log) price"],
    ['The ridge behind','the combined cycle gauge (trend + valuation + sentiment), week by week'],
    ['The far ridge','valuation — market price vs what holders paid'],
    ['The colours','each week’s cycle season — deep blue (bottoming) through red heat (euphoria)'],
    ['The sky',`the macro tide — dawn means it helps, storm means it hurts · now: ${r.macro.state}`],
    fear!=null?['The mist',`crowd fear — denser means more afraid · now: ${fear>.5?'thick (deep fear)':fear>.15?'present (fearful)':'thin (calm)'}`]:null,
    ['The water',`central-bank liquidity under everything · now ${r.macro.netLiq}, ${r.macro.netLiqTrend}`],
    ['The beacon',S.scrub!=null?`the week you scrubbed to (${r.date}) — drag the Time Machine to move it`:'where we are right now'],
    r.div&&r.div.on?['The lightning','price is running ahead of on-chain value — a divergence warning']:null,
  ].filter(Boolean);
  return `<div class="card jrcard">
    <div class="jrtop">
      <span class="sect">The journey <span style="color:#5c5c63">· 16 years of bitcoin as one landscape</span></span>
      <span class="jrbtns">
        <button class="jrbtn" onclick="jrSnap()">⤓ save image</button>
        <button class="jrbtn" onclick="jrFull()">⛶ fullscreen</button>
        <button class="jrbtn" onclick="S.jrLegend=!S.jrLegend;render()">${S.jrLegend?'hide the key':'what am I looking at?'}</button>
      </span></div>
    <div class="jrwrap" id="jrwrap"><canvas id="jrc"></canvas></div>
    <div class="jrnote">Every shape is real data — the mountains are bitcoin's entire price history, the weather is today's macro. Nothing is decoration; new signals become new parts of the landscape.</div>
    ${S.jrLegend?`<div class="jrleg">${legend.map(l=>`<div class="row"><span class="k">${l[0]}</span><span>${l[1]}</span></div>`).join('')}</div>`:''}
  </div>`;
}

function modeToggle(){return `<div class="modetog">
  <span onclick="toggleSimple(true)" class="${S.simple?'on':''}">Simple</span>
  <span onclick="toggleSimple(false)" class="${S.simple?'':'on'}">Detailed</span>
</div>`;}
function masthead(r){const zone=zoneFor(r);return `<div class="mast">
  <div><div class="brand"><h1 class="serif">The Cockpit</h1><span class="badge">private</span></div>
  <div class="tag">A private Bitcoin cycle-reading dashboard · reading the tide, not calling the top</div>
  <div style="margin-top:10px">${modeToggle()}</div></div>
  <div style="text-align:right"><div class="nowlbl">Now reading</div>
    <div style="display:flex;align-items:center;gap:9px;justify-content:flex-end;margin-top:6px"><span style="width:9px;height:9px;border-radius:50%;background:${ZC[zone]};box-shadow:0 0 10px ${ZC[zone]}"></span><span style="font:14px ui-monospace,monospace">${r.label}</span></div>
    <div style="font:11px ui-monospace,monospace;color:#8e8e95;margin-top:4px">${r.date} · ${zone.toUpperCase()} · BTC ${r.price}</div>
    ${window.COCKPIT_LIVE&&window.COCKPIT_LIVE.generated?`<div style="font:10px ui-monospace,monospace;color:#5c5c63;margin-top:3px">live feed · updated ${window.COCKPIT_LIVE.generated}</div>`:''}
    ${PULLSRV?`<div style="margin-top:7px"><span class="pullbtn${PULLING?' on':''}" onclick="pullNow()">${PULLING?'⟳ pulling fresh data — about a minute…':'⟳ pull fresh data'}</span></div>`:''}
  </div></div>`;}

function render(){
  const r=read();
  const app=document.getElementById('app');
  const rightCol=S.simple?narrativePanel(r):narrativePanel(r)+calibrationPanel(r);
  const below=S.simple?'':radarPanel(r)+postsPanel(r)+mathsPanel();
  app.innerHTML=
    masthead(r)+(S.simple?journeyPanel(r):'')+verdictPanel(r)+timeMachine()+
    `<div class="cols"><div class="col">${macroPanel(r)}${dialsPanel(r)}</div><div class="col">${rightCol}</div></div>`+
    below+
    (S.simple?`<div style="font:12px/1.6 system-ui;color:var(--faint2);text-align:center;padding-top:6px">Switch to <b>Detailed</b> (top-left) for the evidence tiers, sample sizes, post drafts and calibration record.</div>`:'')+
    `<div class="footer">Sources: Coin Metrics community · FRED · alternative.me. The composite reads as a zone, never a decimal. Historical calibration is a retrospective back-test; the live record began 2026-07-01. Context and education, not financial advice.</div>`;
  if(!MOUNTED){  // subtle entrance — first paint only, so interactions don't re-animate
    [...app.children].forEach((c,i)=>{c.style.animation='panelIn .55s cubic-bezier(.22,1,.36,1) both';c.style.animationDelay=(Math.min(i,7)*0.055)+'s';});
    MOUNTED=true;
  }
  if(document.getElementById('jrc')) jrStart();
  else if(JRAF){cancelAnimationFrame(JRAF);JRAF=null;}
}
render();
</script>
</body>
</html>
