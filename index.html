<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0B0D11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cockpit">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Cockpit — weekly read</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,450;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,450&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D11; --panel:#181C22; --panel2:#20252D; --panel3:#13161B;
    --border:#2A2F38; --border2:#23272F; --text:#E9ECEF; --muted:#99A1AC;
    --faint:#6B7280; --faint2:#586170; --accent:#6EA8FE;
    --z-bottoming:#3E7BD6; --z-accumulation:#21B8A6; --z-mid:#5FB37A;
    --z-elevated:#E8A13A; --z-euphoria:#E4574C; --divergence:#B06FE0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  .mono{font-family:'JetBrains Mono',monospace}
  .serif{font-family:'Fraunces',Georgia,serif}
  .sect{font:600 10.5px 'Inter';letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .stage{min-height:100%;background:radial-gradient(1200px 600px at 50% -10%,#12161d,#0B0D11 60%);padding:34px 30px 60px}
  .wrap{max-width:1160px;margin:0 auto;display:flex;flex-direction:column;gap:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 24px}

  /* masthead */
  .mast{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand h1{margin:0;font:600 31px 'Fraunces',Georgia,serif;letter-spacing:.01em}
  .badge{font:600 9px 'Inter';letter-spacing:.14em;text-transform:uppercase;color:var(--faint);border:1px solid var(--border);border-radius:5px;padding:3px 7px}
  .tag{font:400 12.5px 'Inter';color:#8A93A0;margin-top:5px}
  .nowlbl{font:600 9.5px 'Inter';letter-spacing:.16em;text-transform:uppercase;color:var(--faint2)}

  /* time machine */
  .tm{background:#12151a;border:1px solid var(--border2);border-radius:15px;padding:20px 26px 14px}
  .tm-nav{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;user-select:none}
  .tm-nav:hover{color:var(--text);border-color:#3a414c}
  .tm-plot{position:relative;height:132px;margin-top:12px}
  .tm-node{position:absolute;top:0;bottom:0;transform:translateX(-50%);width:46px;cursor:pointer}
  .tm-dot{position:absolute;left:50%;transform:translate(-50%,-50%);border-radius:50%;transition:width .3s cubic-bezier(.22,1,.36,1),height .3s cubic-bezier(.22,1,.36,1),box-shadow .3s}
  .tm-short{position:absolute;left:50%;top:108px;transform:translateX(-50%);font:10px 'JetBrains Mono',monospace;white-space:nowrap;transition:color .3s}

  /* columns */
  .cols{display:flex;gap:16px;align-items:flex-start}
  .col{flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}

  /* verdict */
  .verdict{margin:0 0 22px;font:450 24px/1.46 'Fraunces',Georgia,serif;color:#E4E8ED;letter-spacing:.002em}
  .zoneName{font:600 50px/.9 'Fraunces',Georgia,serif;letter-spacing:.01em}
  .qbtn{cursor:pointer;width:19px;height:19px;border-radius:50%;border:1px solid var(--border);color:var(--muted);font:600 11px 'Inter';display:inline-flex;align-items:center;justify-content:center;user-select:none}
  .qbtn:hover{color:var(--text);border-color:#3a414c}
  .divchip{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:9px;background:rgba(176,111,224,.12);border:1px solid rgba(176,111,224,.5)}
  .divsq{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);background:var(--divergence);box-shadow:0 0 10px rgba(176,111,224,.8)}

  /* band */
  .band{position:relative;height:15px;border-radius:8px;background:linear-gradient(90deg,#3E7BD6,#21B8A6 25%,#5FB37A 50%,#E8A13A 75%,#E4574C);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),inset 0 2px 5px rgba(0,0,0,.25)}
  .marker{position:absolute;top:-9px;bottom:-9px;width:0;animation:markerIn .9s cubic-bezier(.34,1.3,.5,1) both;pointer-events:none}
  .marker .halo{position:absolute;left:50%;top:50%;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,rgba(233,236,239,.5),rgba(233,236,239,0) 70%);animation:haloPulse 3.4s ease-in-out infinite}
  .marker .stem{position:absolute;left:-1.5px;top:0;bottom:0;width:3px;border-radius:2px;background:var(--text);box-shadow:0 0 10px rgba(233,236,239,.6)}
  .marker .knob{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--text)}
  .ticks{position:relative;height:24px}
  .tick{position:absolute;bottom:0;transform:translateX(-50%);text-align:center}
  .tick .t{font:9px 'JetBrains Mono',monospace;color:var(--faint2)}
  .tick .bar{width:1px;height:7px;margin:2px auto 0}
  .zlabels{display:flex;margin-top:13px}
  .zlabels>div{flex:1;padding-top:8px}
  .zl{font-family:'Inter';font-size:11px;letter-spacing:.05em;text-transform:uppercase}

  .vmeta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:22px;padding-top:15px;border-top:1px solid var(--border2);font:11.5px 'JetBrains Mono',monospace;color:var(--muted)}
  .vsep{width:1px;height:12px;background:var(--border)}
  .pill{padding:2px 7px;border:1px solid var(--border);border-radius:5px;color:var(--faint);font-size:10px}

  /* macro */
  .mstate{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:8px}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mtile{position:relative;padding:12px 13px;border-radius:10px;background:var(--panel2);border:1px solid var(--border2)}
  .mtile .lbl{display:flex;align-items:center;gap:6px;font:500 10px 'Inter';letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .mtile .val{font:16px 'JetBrains Mono',monospace;color:var(--text)}
  .mtile .val .sub{font-size:11px;color:var(--faint)}
  .tip{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:5;padding:10px 12px;border-radius:9px;background:#0B0D11;border:1px solid #333a45;box-shadow:0 12px 30px rgba(0,0,0,.55);font:12px/1.45 'Inter';color:#C6CCD3;opacity:0;visibility:hidden;transition:opacity .18s}
  .mtile:hover .tip{opacity:1;visibility:visible}

  /* dials */
  .dial{border-top:1px solid var(--border2)}
  .dial-row{display:flex;align-items:center;gap:12px;padding:13px 0;cursor:pointer}
  .dial-label{min-width:78px;font:600 12px 'Inter';letter-spacing:.03em;color:var(--text)}
  .dial-read{position:relative;display:flex;align-items:center;gap:7px;min-width:118px}
  .dial-read .r{font:13.5px 'JetBrains Mono',monospace}
  .dtip{position:absolute;left:0;top:calc(100% + 7px);z-index:6;width:230px;padding:10px 12px;border-radius:9px;background:#0B0D11;border:1px solid #333a45;box-shadow:0 12px 30px rgba(0,0,0,.55);font:12px/1.45 'Inter';color:#C6CCD3;opacity:0;visibility:hidden;transition:opacity .18s}
  .dial-read:hover .dtip{opacity:1;visibility:visible}
  .tier{padding:3px 8px;border-radius:6px;font:9.5px 'Inter';letter-spacing:.05em;cursor:pointer;white-space:nowrap}
  .dial-n{font:10.5px 'JetBrains Mono',monospace;color:var(--faint2);white-space:nowrap}
  .llchip{padding:2px 6px;border-radius:5px;border:1px solid var(--border2);font:9px 'Inter';letter-spacing:.03em;color:var(--faint2);white-space:nowrap}
  .refrow{display:grid;grid-template-columns:88px 58px 1fr auto;align-items:baseline;gap:3px 10px;padding:8px 0;border-top:1px solid #20242b}
  .refname{font:600 11px 'Inter';color:var(--muted)}
  .refread{font:12.5px 'JetBrains Mono',monospace;color:var(--text)}
  .refstate{font:12px 'Inter';color:var(--muted)}
  .refnote{grid-column:2/-1;font:italic 400 10.5px 'Inter';color:var(--faint2)}
  @media(max-width:820px){.refrow{grid-template-columns:74px 52px 1fr auto}.refnote{grid-column:1/-1}}
  .chev{color:var(--faint2);font-size:11px;transition:transform .3s}
  .dial-mean{padding-left:90px;margin-top:3px;font:13.5px/1.45 'Inter';color:var(--muted)}
  .pop{position:absolute;right:0;top:calc(100% + 7px);z-index:7;width:260px;padding:13px 15px;border-radius:11px;background:#0B0D11;border:1px solid #333a45;box-shadow:0 16px 36px rgba(0,0,0,.6)}
  .expand{padding:2px 0 16px 90px}
  .expand .inner{padding:13px 16px;border-radius:11px;background:var(--panel3);border:1px solid var(--border2)}
  .post{margin:0 0 12px;font:italic 450 15.5px/1.5 'Fraunces',Georgia,serif;color:#D8DDE3}

  /* narrative + calibration */
  .narr{display:flex;gap:11px;align-items:baseline}
  .narr .a{font:13px 'JetBrains Mono',monospace;width:14px;text-align:center;color:var(--faint2)}
  .narr .t{font:13.5px/1.5 'Inter';color:#C6CCD3}
  .calhead{display:flex;gap:10px;padding:0 4px 8px;font:600 9px 'Inter';letter-spacing:.08em;text-transform:uppercase;color:var(--faint2)}
  .calrow{display:flex;gap:10px;align-items:center;padding:9px 4px;border-top:1px solid #20242b}
  .pending{padding:13px 15px;border-radius:11px;background:rgba(62,123,214,.08);border:1px solid rgba(62,123,214,.28);margin-bottom:14px}

  .footer{font:12px/1.65 'Inter';color:var(--faint2);max-width:900px;border-top:1px solid #1b1f26;padding-top:18px}
  @keyframes markerIn{from{transform:translateX(-32px)}to{transform:translateX(0)}}
  @keyframes haloPulse{0%,100%{opacity:.35;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.25)}}
  @keyframes expandIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ---- responsive: collapse to single column / phone sizes ---- */
  @media(max-width:820px){
    .stage{padding:18px 12px 40px}
    .cols{flex-direction:column}
    .card{padding:17px 18px}
    .verdict{font-size:17px}
    .zoneName{font-size:30px}
    .zl{font-size:8px;letter-spacing:0;text-transform:none}
    .ticks{display:none}
    .brand h1{font-size:26px}
    .hide-sm{display:none}
    .dial-mean{padding-left:0}
    .expand{padding-left:0}
  }
</style>
</head>

function rgba(hex,a){const h=hex.replace('#','');return 'rgba('+parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16)+','+a+')';}
function D(key,label,reading,dir,meaning,post,tier,n,na){return {key,label,reading,dir,meaning,post,tier,n,detail:DET[key],caveat:CAV[key],na:!!na};}

  D('trend','Trend',t[0],t[1],t[2],t[3],'base','n=7'),

function tmIndex(){ if(CYCW) return;
  CYCW={};
  HIST.weeks.forEach((w,i)=>{ if(w[5]!=null){(CYCW[w[4]]=CYCW[w[4]]||[]).push([w[5],i]);} });

}
function tmY(c){ return 8+(1-c)*134; }  // plot height 150, 8px margins
function tmAtDays(cyc,days){
  const arr=CYCW[cyc]; if(!arr) return null;
  let best=null,bd=1e9;
  for(const [dd,i] of arr){ const df=Math.abs(dd-days); if(df<bd){bd=df;best=i;} }
  return bd<=14?best:null;
}
function tmReadout(i){
  const w=HIST.weeks[i], zone=zoneOf(w[1]), zc=ZC[zone];
  const px='$'+Math.round(w[3]).toLocaleString();

function tmScrub(e){
  const el=document.getElementById('tmplot'); if(!el) return;

      ${hlabels}${dots}

  const rows=r.dials.map(d=>{
    const tierColor=d.tier==='mechanism'?'#C6CCD3':d.tier==='base'?'#99A1AC':'#6B7280';
    const tierWeight=d.tier==='mechanism'?600:d.tier==='base'?500:400;
    const tierBorder=d.tier==='story'?'1px dashed #2A2F38':'1px solid #2A2F38';
    const exp=S.expanded===d.key,pop=S.pop===d.key;
    return `<div class="dial">
      <div class="dial-row" onclick="toggleDial('${d.key}')">
        <div class="dial-label">${d.label}</div>
        <div class="dial-read"><span class="r" style="color:${d.na?'#586170':'#E9ECEF'}">${esc(d.reading)}</span><span style="font-size:12px;color:#6B7280">${ARR[d.dir]}</span><div class="dtip">${d.detail}</div></div>
        <div style="flex:1;min-width:0"></div>
        <div style="position:relative;display:flex;align-items:center;gap:9px">
          <span class="tier" style="color:${tierColor};border:${tierBorder};font-weight:${tierWeight};font-style:${d.tier==='story'?'italic':'normal'}" onclick="toggleTier('${d.key}',event)">${TTXT[d.tier]}</span>
          <span class="dial-n">${d.n}</span>
          <span class="llchip">${LL[d.key]||''}</span>
          <span class="chev" style="transform:${exp?'rotate(180deg)':'rotate(0deg)'}">▾</span>
          ${pop?`<div class="pop"><div style="font:600 9.5px 'Inter';letter-spacing:.08em;color:#8A93A0;margin-bottom:7px">EVIDENCE · ${TTXT[d.tier]}</div><div style="font:12.5px/1.5 'Inter';color:#C6CCD3;margin-bottom:9px">${TDEF[d.tier]}</div><div style="padding-top:9px;border-top:1px solid #23272F;font:italic 400 12px/1.45 'Inter';color:#8A93A0">Caveat — ${d.caveat}</div></div>`:''}
        </div>
      </div>
      <div class="dial-mean">${esc(d.meaning)}</div>
      ${exp?`<div class="expand" style="animation:expandIn .32s cubic-bezier(.22,1,.36,1) both"><div class="inner">
        <div style="font:600 9.5px 'Inter';letter-spacing:.1em;text-transform:uppercase;color:#586170;margin-bottom:7px">Post angle — the teachable line</div>
        <p class="post">“${esc(d.post||d.meaning)}”</p>
        <div style="font:12px/1.5 'Inter';color:#8A93A0"><span style="color:#6B7280">How it reads: </span>${d.detail}</div>
        <div style="margin-top:9px;padding-top:10px;border-top:1px solid #23272F;font:italic 400 11.5px/1.45 'Inter';color:#6B7280">Caveat — ${d.caveat}</div>
      </div></div>`:''}
    </div>`;}).join('');
  const ref=(REF[r.id]||[]).map(x=>`<div class="refrow">
      <span class="refname">${x.name}</span><span class="refread">${x.reading}</span>
      <span class="refstate">${x.state}</span><span class="llchip">${x.ll}</span>
      ${x.note?`<span class="refnote">${x.note}</span>`:''}
    </div>`).join('');
  const refBlock=ref?`<div class="sect" style="margin:18px 0 4px">Reference layer · vetted instruments</div>
    <div style="font:italic 400 11px/1.4 'Inter';color:var(--faint2);margin-bottom:4px">Consulted, not stared at — verdicts ride on each row. Vetted out: Pi Cycle (data-mined; no fire 2025), active addresses (decoupled).</div>${ref}`:'';
  return `<div class="card"><div class="sect" style="margin-bottom:6px">BTC-native dials</div>${rows}${refBlock}</div>`;
}

function narrativePanel(r){
  const lines=r.narrative.map(n=>`<div class="narr"><span class="a">${ARR[n.dir]}</span><span class="t">${esc(n.text)}</span></div>`).join('');
  return `<div class="card"><div class="sect" style="margin-bottom:14px">Narrative log <span style="color:#454b55">· week over week</span></div><div style="display:flex;flex-direction:column;gap:11px">${lines}</div></div>`;
}

function calibrationPanel(r){
  const scoreMap={within:{label:'in band',color:'#5FB37A'},outside:{label:'out of band',color:'#E4574C'},pending:{label:'pending',color:'#6B7280'}};
  const within=READS.filter(x=>x.outcome&&x.outcome.scored==='within').length;
  const outside=READS.filter(x=>x.outcome&&x.outcome.scored==='outside').length;
  const rows=READS.map(x=>{const rz=zoneOf(x.composite),o=x.outcome,sc=o?o.scored:'pending',cur=x.id===r.id;
    return `<div class="calrow" style="background:${cur?'rgba(110,168,254,.09)':'transparent'}">
      <span style="width:66px;font:11px 'JetBrains Mono',monospace;color:${cur?'#E9ECEF':'#8A93A0'}">${x.short}</span>
      <span style="flex:1;display:inline-flex;align-items:center;gap:7px;min-width:0"><span style="width:8px;height:8px;border-radius:50%;flex:none;background:${ZC[rz]}"></span><span style="font:12px 'Inter';color:#99A1AC;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${rz}</span></span>
      <span style="width:88px;font:11.5px 'JetBrains Mono',monospace;color:#C6CCD3">${o?o.range:'—'}</span>
      <span style="width:70px;text-align:right;font:600 10px 'Inter';color:${scoreMap[sc].color}">${scoreMap[sc].label}</span>
    </div>`;}).join('');
  const pending=r.id==='live'?`<div class="pending"><div style="font:600 10px 'Inter';letter-spacing:.05em;text-transform:uppercase;color:#6EA8FE;margin-bottom:6px">Entry #1 · pending</div><div style="font:12.5px/1.5 'Inter';color:#C6CCD3;margin-bottom:9px">Outcome resolves at 4 / 8 / 12 weeks. Calibration builds as weeks pass.</div><div style="font:12px/1.45 'Inter';color:#8A93A0"><span style="color:#6B7280">Invalidation line — </span>${esc(r.invalidation)}</div></div>`:'';
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px"><span class="sect">Calibration log <span style="color:#454b55">· private</span></span><span style="font:10px 'JetBrains Mono',monospace;color:#586170">${within} in band · ${outside} out · n=${within+outside}</span></div>
    ${pending}
    <div class="calhead"><span style="width:66px">Pivot</span><span style="flex:1">Zone called</span><span style="width:88px">Forward</span><span style="width:70px;text-align:right">Scored</span></div>
    ${rows}
    <div style="margin-top:12px;font:italic 400 11.5px/1.45 'Inter';color:#6B7280">Retrospective back-test — the live track record starts with the 2026-07-01 entry. Outcomes are ranges of real forward price, framed as state, never trade calls.</div>
  </div>`;
}

/* Phase 8 — Post studio: gated drafts shipped in the payload. Live read only.
   Copy-to-clipboard; nothing auto-posts. */
function copyPost(kind,idx,btn){
  const P=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.posts; if(!P)return;
  const text = kind==='thread' ? P.thread[idx] : P[kind][idx].text;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='copied ✓';setTimeout(()=>btn.textContent='copy',1400);});
}
function postsPanel(r){
  const P=window.COCKPIT_LIVE&&window.COCKPIT_LIVE.posts;
  if(r.id!=='live'||!P) return '';
  const card=(kind,idx,title,text)=>{
    const n=text.length, over=n>280;
    return `<div style="padding:12px 14px;border-radius:11px;background:var(--panel3);border:1px solid var(--border2);display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="font:600 10px 'Inter';letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">${title}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span style="font:10px 'JetBrains Mono',monospace;color:${over?'#E8A13A':'#586170'}">${n}/280</span>
          <button onclick="copyPost('${kind}',${idx},this)" style="cursor:pointer;font:600 10px 'Inter';color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:3px 9px">copy</button>
        </span>
      </div>
      <div style="font:13px/1.55 'Inter';color:#C6CCD3;white-space:pre-wrap">${text}</div>
    </div>`;
  };
  const thread=P.thread.map((t,i)=>card('thread',i,`thread ${i+1}/${P.thread.length}`,t)).join('');
  const signals=P.signals.map((p,i)=>card('signals',i,p.name,p.text)).join('');
  const combos=P.combos.length?P.combos.map((p,i)=>card('combos',i,'⚡ '+p.name,p.text)).join('')
    :`<div style="font:italic 400 12px 'Inter';color:var(--faint2)">No combo conditions met this week — combos fire only when related signals line up.</div>`;
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px">
      <span class="sect">Post studio <span style="color:#454b55">· drafts from the live read</span></span>
      <span style="font:10px 'JetBrains Mono',monospace;color:#586170">gate-checked · nothing auto-posts</span>
    </div>
    <div style="font:italic 400 11px/1.5 'Inter';color:var(--faint2);margin-bottom:12px">Regenerated with each data refresh — when the panel changes materially, so do these. Edit before posting.</div>
    <div class="sect" style="font-size:9.5px;margin-bottom:8px">The weekly thread</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px">${thread}</div>
    <div class="sect" style="font-size:9.5px;margin:16px 0 8px">Single-signal posts</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px">${signals}</div>
    <div class="sect" style="font-size:9.5px;margin:16px 0 8px">Combo posts · fired by current conditions</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px">${combos}</div>
  </div>`;
}

function mathsPanel(){
  const row=(k,v)=>`<div style="display:flex;gap:12px;align-items:baseline;padding:8px 0;border-top:1px solid #20242b;flex-wrap:wrap">
    <span style="min-width:150px;font:600 11px 'Inter';color:var(--muted)">${k}</span>
    <span style="flex:1;font:13px/1.5 'Inter';color:#C6CCD3;min-width:240px">${v}</span></div>`;
  return `<div class="card"><div class="sect" style="margin-bottom:6px">Cycle mathematics <span style="color:#454b55">· tested on the locked spine</span></div>
    ${row('Lengthening cycles','<span class="mono">371 → 525 → 546 → 534</span> days halving→top (n=4) — lengthened for three cycles, then <b>plateaued</b> in the ETF era.')}
    ${row('Diminishing returns','<span class="mono">111.8× → 21.2× → 7.9×</span> bottom→top (n=3) — clean decay; every dial’s top extremity shrinks in step (Mayer 5.71→1.18, composite 0.93→0.47).')}
    ${row('Two lenses','Absolute vs rolling-4y-percentile agree at 6 of 7 pivots. The 2025 top is the split — <b>mid-cycle</b> absolute, <b>top band</b> relative. The split is the content.')}
    ${row('Dominance map','BTC.D <span class="mono">43.6%</span> at the 2021 top (deep alt-season) vs <span class="mono">59.5%</span> at 2025 (BTC-led, ETF era) — regime-distinct.')}
    ${row('Macro gate','2021 top fuel: <span class="mono">−1.11%</span> real yields (repression) · 2025: <span class="mono">+1.84%</span> (restrictive). Same zone label, different fuel.')}
  </div>`;
}

function masthead(r){const zone=zoneOf(r.composite);return `<div class="mast">
  <div><div class="brand"><h1 class="serif">The Cockpit</h1><span class="badge">private</span></div>
  <div class="tag">A private Bitcoin cycle-reading dashboard · reading the tide, not calling the top</div></div>
  <div style="text-align:right"><div class="nowlbl">Now reading</div>
    <div style="display:flex;align-items:center;gap:9px;justify-content:flex-end;margin-top:6px"><span style="width:9px;height:9px;border-radius:50%;background:${ZC[zone]};box-shadow:0 0 10px ${ZC[zone]}"></span><span style="font:14px 'JetBrains Mono',monospace">${r.label}</span></div>
    <div style="font:11px 'JetBrains Mono',monospace;color:#6B7280;margin-top:4px">${r.date} · ${zone.toUpperCase()} · BTC ${r.price}</div>
    ${window.COCKPIT_LIVE&&window.COCKPIT_LIVE.generated?`<div style="font:10px 'JetBrains Mono',monospace;color:#454b55;margin-top:3px">live feed · updated ${window.COCKPIT_LIVE.generated}</div>`:''}
  </div></div>`;}

function render(){
  const r=read();
  document.getElementById('app').innerHTML=
    masthead(r)+timeMachine()+verdictPanel(r)+
    `<div class="cols"><div class="col">${macroPanel(r)}${dialsPanel(r)}</div><div class="col">${narrativePanel(r)}${calibrationPanel(r)}</div></div>`+
    postsPanel(r)+
    mathsPanel()+
    `<div class="footer">Sources: Coin Metrics community · FRED · alternative.me. The composite reads as a zone, never a decimal. Historical calibration is a retrospective back-test; the live record began 2026-07-01. Context and education, not financial advice.</div>`;
}
render();
</script>
</body>
</html>
